global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: trading-swarm
    replica: '{{.ExternalURL}}'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'trading-swarm'
    scrape_interval: 15s
    static_configs:
      - targets: 
          - 'scanner:8000'
          - 'validator:8000'
          - 'risk_engine:8000'
          - 'master:8000'
          - 'position_monitor:8000'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__address__]
        regex: '([^:]+):.*'
        target_label: job
        replacement: '${1}'
